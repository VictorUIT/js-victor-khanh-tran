<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <h3 id="message">Hello everyone!</h3>

    <button onclick="inNoiDung()">Content</button>
    <button onclick="inNoiDungCu()">Previous Content</button>
    <button onclick="doiMau()">Change Color</button>

    <script>
      function inNoiDung() {
        document.getElementById("message").innerHTML = "Hello everyone all!";
      }

      function inNoiDungCu() {
        document.getElementById("message").innerHTML = "Hello everyone!";
      }
      function doiMau() {
        var element = document.getElementById("message");

        if ((element.style.color = "blue")) {
          element.style.color = "red";
        } else {
          element.style.color = "blue";
        }
      }
    </script>
  </body>
</html>
