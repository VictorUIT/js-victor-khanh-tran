<html>
  <head>
    <title>JS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>

    <div class="container mt-4">

      <h2>Danh sách điện thoại</h2>

      <select class="form-select w-25 mb-3" onchange="sortProducts(this.value)">
        <option value="asc">Giá tăng dần</option>
        <option value="desc">Giá giảm dần</option>
      </select>

    </div>

    <div class="row" id="product-list"></div>

    <script>

      let products = [];
      // load dữ liệu khi mở trang
      window.onload = function () {
        loadProducts();
      };

      ////XMLHttpRequest load JSON
      function loadProducts() {
        let xhr = new XMLHttpRequest();
        xhr.open("GET", "product.json", true);

        xhr.onload = function () {
          if (xhr.status == 200) {
            products = JSON.parse(xhr.responseText);
            renderProduct(products);
          }
        };
        xhr.send();
      }

      function renderProduct(list) {
        let html = "";
        list.forEach((product) => {
          html =
            html +
            `
                <div class="col-md-4">
                    <div class="card md-3">
                        <img src="${product.img}" width="100px"/>
                        <div class="card-body">
                            <h5>${product.name}</h5>
                            <p>${product.price}</p>
                        </div>
                    </div>
                </div>`;
        });

        document.getElementById("product-list").innerHTML = html;
      }

      function sortProduct(type) {
        if (type == "asc") {
           product.sort((a, b) => a.price - b.price);
         } else {
           product.sort((a, b) => b.price - a.price);
         }
         renderProduct(products);
     }

    </script>
  </body>
</html>
