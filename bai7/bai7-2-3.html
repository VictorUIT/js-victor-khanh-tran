<html>
<head>
    <title>JS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>
<body>

    <h2>Danh sách điện thoại</h2>
    <div id="product-list"></div>

    <div style="float: left; width: 100%; text-align: center;">
        <button onclick="showMore()">Show More</button>
    </div>

    <div id="loading" style="float: left; width: 100%; text-align: center;"></div>

    <script>

        let products = [];
        let currentIndex = 0;
        let step = 3;

        //load dữ liệu khi mở trang
        window.onload = function(){
            loadProduct();
        }

        //XMLHttpRequest load JSON
        function loadProduct(){
            let xhr = new XMLHttpRequest();
            xhr.open("GET", "product.json", true);

            xhr.onload = function(){
                if(xhr.status == 200) {
                    products = JSON.parse(xhr.responseText);
                    showProducts();
                }
            };
            xhr.send();
        }

        function showProducts() {
            let html = "";
            let nextIndex = currentIndex + step;
            let list = products.slice(currentIndex, nextIndex);

            list.forEach(product => {
                html += `
                <div style="width: 25%; float: left; text-align: center; ">
                    <img src="${product.img}" width="120">
                    <p>${product.name}</p>
                    <p>${product.price} VND</p>
                    <hr>
                </div>
                    `})
        
            document.getElementById("product-list").innerHTML = html;
            currentIndex = nextIndex;
        }

        //Click Show More
        function showMore(){

            document.getElementById("loading").innerHTML = `<img src="img/loading.gif" width="50">`;
            document.getElementById("loadBtn").disabled = true;
            
            setTimeout(() => {
                showProducts();

                document.getElementById("loading").innerHTML = "";
                document.getElementById("loadBtn").disabled = false;

                console.log(currentIndex);
                console.log(currentIndex >= products.length);

                if(currentIndex >= products.length){
                    document.getElementById("loadBtn").style.display = "none";
                    document.getElementById("loading").innerHTML = "Đã load hết sản phẩm"
                                                    }
                            }, 2000);
                        }
                
    </script>
</body>
</html>
