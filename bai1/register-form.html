<html>
    <head>
        <title>Đại học khoa học tự nhiên</title>
    </head>

    <body>

        <h1>Register Form</h1>
        <p>Hay nhap thong tin</p>
        
        <form>
            <input type="text" id="username" placeholder="Username" /> <br>
            <input type="password" id="password" name="password" placeholder="Password"/> <br>
            <input type="email" id="email" name="email" placeholder="Email"/> <br>
            <input type="number" id="age" name="age" placeholder="Age"/> <br>
            <input type="radio" id="gender" name="gender" value="M" /> Male
            <input type="radio" id="gender" name="gender" value="F" /> Female
            <input type="radio" id="gender" name="gender" value="O" /> Other <br>

            <textarea name="description" rows="10" cols="50">Noi dung mo ta</textarea> <br>

            <select name="country">
                <option value="EN">England</option>
                <option value="JP">Japan</option>
                <option value="VN" selected>Vietnam</option>
            </select> <br>

            <input type="checkbox" id="remember" name="remember" value="true" /> Remember <br>
            <button onclick="alert('Ban da dang ky thanh cong')">Dang Ky</button>
        </form>

    </body>
</html>
